      <stop offset="0" stop-color="#0b1220" />
      <stop offset="0.55" stop-color="#2563eb" />
      <stop offset="1" stop-color="#06b6d4" />
    </linearGradient>
    <radialGradient id="shine" cx="0.25" cy="0.2" r="0.95">
